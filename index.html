<!DOCTYPE html>
<html>
<head>

<meta name="google-site-verification" content="MZGI3TNswt_g_9JsZ-OmdNNfAD5yEZ4jdGFH0eKw7L4" />

<title>Arman CSC - Online Services Login | Aadhar, PAN, Railway</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Arman CSC provides all online services like Aadhar card, PAN card, railway ticket booking, banking, recharge and more. Login to access services.">

<meta name="keywords" content="Aadhar card, PAN card, railway ticket, CSC services, online services, SBI account, recharge">

<meta name="author" content="Arman CSC">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1f1c2c,#928DAB);
  height:100vh; 
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container {
  background: rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  width:320px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.2);
}

input {
  width:90%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#7f00ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  background:#9d4edd;
}

h1 { margin-bottom:20px; }
hr { border:1px solid rgba(255,255,255,0.2); }
</style>
</head>

<body>

<div class="container">

<h1>Arman CSC Login</h1>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<br><br>
<hr>
<h3>Create New Account</h3>

<input id="newUser" placeholder="New Username">
<input id="newPass" type="password" placeholder="New Password">
<button onclick="signup()">Create Account</button>

</div>

<script>
function signup(){
  localStorage.setItem("user", newUser.value);
  localStorage.setItem("pass", newPass.value);
  alert("Account Created Successfully!");
}

function login(){
  let u = loginUser.value;
  let p = loginPass.value;

  let su = localStorage.getItem("user");
  let sp = localStorage.getItem("pass");

  if((u==su && p==sp) || (u=="admin" && p=="1234")){
    window.location="dashboard.html";
  } else {
    alert("Wrong Username or Password");
  }
}
</script>

</body>
</html>
