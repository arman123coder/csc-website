<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Login</h2>

<input id="loginUser" placeholder="Username"><br><br>
<input id="loginPass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<h3>OR</h3>

<h2>Create Account</h2>

<input id="newUser" placeholder="New Username"><br><br>
<input id="newPass" type="password" placeholder="New Password"><br><br>

<button onclick="signup()">Create Account</button>

<script>
function signup(){
  let user = document.getElementById("newUser").value;
  let pass = document.getElementById("newPass").value;

  if(user === "" || pass === ""){
    alert("Fill all fields ❗");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("Account Created ✅");
}

function login(){
  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  // DEBUG (optional)
  console.log(savedUser, savedPass);

  if(
    (u === savedUser && p === savedPass) ||
    (u === "admin" && p === "1234")
  ){
    alert("Login Success ✅");
    window.location.href = "dashboard.html";
  } else {
    alert("Wrong Login ❌");
  }
}
</script>

</body>
</html>
