<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f3f0ff;
}

.sidebar {
  width:230px;
  height:100vh;
  background:linear-gradient(180deg,#4b1a8c,#2a1f4d);
  position:fixed;
  color:white;
  padding-top:20px;
}

.sidebar h2 {
  text-align:center;
  margin-bottom:20px;
}

.sidebar a {
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.sidebar a:hover {
  background:rgba(255,255,255,0.2);
  padding-left:20px;
}

.content {
  margin-left:250px;
  padding:30px;
}

.card {
  background:white;
  padding:20px;
  margin:15px 0;
  border-radius:15px;
  box-shadow:0 0 12px rgba(0,0,0,0.2);
  font-size:18px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>Arman Admin</h2>

  <!-- Dashboard -->
  <a href="dashboard.html">🏠 Dashboard</a>

  <!-- Settings -->
  <a href="settings.html">⚙️ Settings</a>

  <!-- Services -->
  <a href="services.html">🧾 Services</a>

  <!-- Logout -->
  <a href="index.html">🚪 Logout</a>
</div>

<div class="content">
  <h1>Welcome User 👋</h1>

  <div class="card">Total Users: 12</div>
  <div class="card">Active Services: 8</div>
  <div class="card">Monthly Earnings: ₹700</div>

</div>

</body>
</html>
