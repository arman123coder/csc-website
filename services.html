<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSC Services</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f0ff;
}

header{
background:#5a2ca0;
padding:20px;
color:white;
text-align:center;
font-size:28px;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card i{
font-size:40px;
color:#5a2ca0;
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:10px 15px;
background:#7f00ff;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>🚀 CSC Services Portal</header>

<div class="container">

<div class="grid" id="services"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC3gCB30NjBxacLSoTNITQHTX0uh1TmE68",
authDomain: "csc-portal-13426.firebaseapp.com",
projectId: "csc-portal-13426",
storageBucket: "csc-portal-13426.firebasestorage.app",
messagingSenderId: "928212810654",
appId: "1:928212810654:web:7dd04da7e95787ea05748f"
};

const app = initializeApp(firebaseConfig);

const db=getFirestore(app);

const services=document.getElementById("services");

onSnapshot(collection(db,"services"),(snapshot)=>{

services.innerHTML="";

snapshot.forEach((d)=>{

let s=d.data();

services.innerHTML += `
<div class="card">

<i class="fas ${s.icon}"></i>

<h3>${s.name}</h3>

<a href="${s.link}" target="_blank" class="btn">
Open
</a>

</div>
`;

});

});

</script>

</body>
</html>
