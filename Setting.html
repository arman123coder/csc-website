<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#ece7ff;
}

.sidebar {
  width:230px;
  height:100vh;
  background:linear-gradient(180deg,#4b1a8c,#2a1f4d);
  position:fixed;
  color:white;
  padding-top:20px;
}

.sidebar h2 { text-align:center; }
.sidebar a {
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  font-size:18px;
}
.sidebar a:hover { background:rgba(255,255,255,0.2); }

.content {
  margin-left:250px;
  padding:30px;
}

.box {
  background:white;
  padding:20px;
  width:350px;
  border-radius:15px;
  box-shadow:0 0 12px rgba(0,0,0,0.2);
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #bbb;
}

button {
  background:#7f00ff;
  padding:12px;
  width:100%;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>Settings</h2>
  <a href="dashboard.html">?? Dashboard</a>
  <a href="setting.html"> Setting</a>
  <a href="index.html">?? Logout</a>
</div>

<div class="content">
  <h2>Change Login Details</h2>

  <div class="box">
    <input id="nu" placeholder="New Username">
    <input id="np" placeholder="New Password">
    <button onclick="save()">Save</button>
  </div>
</div>

<script>
function save(){
  localStorage.setItem("user", nu.value);
  localStorage.setItem("pass", np.value);
  alert("Login updated!");
}
</script>

</body>
</html>
