<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Admin Panel</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1f1c2c,#928DAB);
  min-height:100vh;
  color:white;
}

/* HEADER */
header{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* MAIN CONTAINER */
.container{
  width:90%;
  max-width:1100px;
  margin:30px auto;
}

/* FORM BOX */
.form-box{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  margin-bottom:30px;
}

.form-box h2{
  margin-top:0;
  color:#fff;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:12px 0;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,#7f00ff,#9d4edd);
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  background:linear-gradient(135deg,#9d4edd,#c77dff);
}

/* SERVICE GRID */
.list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card i{
  font-size:40px;
  margin-bottom:12px;
  color:#fff;
}

.card h3{
  margin:10px 0;
}

/* DELETE BUTTON */
.delete-btn{
  background:#ff4d6d;
  margin-top:12px;
}

.delete-btn:hover{
  background:#ff758f;
}

</style>
</head>

<body>

<header>
⚡ Premium Admin Panel
</header>

<div class="container">

<!-- FORM -->
<div class="form-box">

<h2>Add New Service</h2>

<input id="name" type="text" placeholder="Service Name">

<input id="link" type="text" placeholder="https://example.com">

<input id="icon" type="text" placeholder="Font Awesome Icon Example: fa-id-card">

<button onclick="addService()">➕ Add Service</button>

</div>

<!-- SERVICES -->
<h2>All Services</h2>

<div class="list" id="list"></div>

</div>

<script>

let services = JSON.parse(localStorage.getItem("services")) || [];

/* SHOW SERVICES */
function show(){

  let list = document.getElementById("list");

  list.innerHTML = "";

  services.forEach((s,i)=>{

    list.innerHTML += `
    
    <div class="card">

      <i class="fas ${s.icon}"></i>

      <h3>${s.name}</h3>

      <a href="${s.link}" target="_blank">
        <button>🌐 Open</button>
      </a>

      <br>

      <button class="delete-btn" onclick="del(${i})">
      🗑 Delete
      </button>

    </div>

    `;
  });

}

/* ADD SERVICE */
function addService(){

  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;
  let icon = document.getElementById("icon").value;

  if(name=="" || link=="" || icon==""){
    alert("Please fill all fields");
    return;
  }

  services.push({
    name:name,
    link:link,
    icon:icon
  });

  localStorage.setItem("services", JSON.stringify(services));

  document.getElementById("name").value="";
  document.getElementById("link").value="";
  document.getElementById("icon").value="";

  show();

}

/* DELETE */
function del(i){

  services.splice(i,1);

  localStorage.setItem("services", JSON.stringify(services));

  show();

}

show();

</script>

</body>
</html>
