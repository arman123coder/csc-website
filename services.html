<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services</title>

<!-- ICON CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

header {
  background:#5a2ca0;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.container {
  padding:20px;
}

.service-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card i {
  font-size:35px;
  color:#5a2ca0;
  margin-bottom:10px;
}

.btn {
  margin-top:10px;
  display:inline-block;
  padding:8px 15px;
  background:#990073;
  color:white;
  border-radius:6px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>Our Services</header>

<div class="container">
  <!-- yaha services auto load hongi -->
  <div class="service-grid" id="box"></div>
</div>

<script>
// localStorage se data uthao
let services = JSON.parse(localStorage.getItem("services")) || [];

let box = document.getElementById("box");

// loop chalao aur cards banao
services.forEach(s => {
  box.innerHTML += `
  <div class="card">
    <i class="fas ${s.icon}"></i>
    <h3>${s.name}</h3>
    <a href="${s.link}" target="_blank" class="btn">Open</a>
  </div>
  `;
});
</script>

</body>
</html>
