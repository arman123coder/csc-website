<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  background:#5a2ca0;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Add Service</h2>

<input type="text" id="name" placeholder="Service Name">

<input type="text" id="icon" placeholder="Font Awesome Icon Example: fa-id-card">

<input type="text" id="link" placeholder="Service Link">

<button onclick="addService()">Add Service</button>

</div>

<script>

function addService(){

let name = document.getElementById("name").value;
let icon = document.getElementById("icon").value;
let link = document.getElementById("link").value;

let services = JSON.parse(localStorage.getItem("services")) || [];

services.push({
  name:name,
  icon:icon,
  link:link
});

localStorage.setItem("services", JSON.stringify(services));

alert("Service Added Successfully!");

}

</script>

</body>
</html>
