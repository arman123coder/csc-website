<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Admin Panel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1f1c2c,#928DAB);
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
background:#5a2ca0;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.form-box{
background:rgba(255,255,255,0.12);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
background:#7f00ff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
text-align:center;
}

.delete-btn{
background:red;
margin-top:10px;
}
</style>
</head>

<body>

<header>🔥 Firebase Admin Panel</header>

<div class="container">

<div class="form-box">

<input id="name" placeholder="Service Name">

<input id="link" placeholder="Service Link">

<input id="icon" placeholder="fa-id-card">

<button onclick="addService()">Add Service</button>

</div>

<div class="list" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC3gCB30NjBxacLSoTNITQHTX0uh1TmE68",
authDomain: "csc-portal-13426.firebaseapp.com",
projectId: "csc-portal-13426",
storageBucket: "csc-portal-13426.firebasestorage.app",
messagingSenderId: "928212810654",
appId: "1:928212810654:web:7dd04da7e95787ea05748f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list=document.getElementById("list");

window.addService = async function(){

let name=document.getElementById("name").value;
let link=document.getElementById("link").value;
let icon=document.getElementById("icon").value;

await addDoc(collection(db,"services"),{
name,
link,
icon
});

alert("Service Added");

}

onSnapshot(collection(db,"services"),(snapshot)=>{

list.innerHTML="";

snapshot.forEach((d)=>{

let s=d.data();

list.innerHTML += `
<div class="card">
<i class="fas ${s.icon}"></i>
<h3>${s.name}</h3>

<a href="${s.link}" target="_blank">
<button>Open</button>
</a>

<br>

<button class="delete-btn" onclick="delService('${d.id}')">
Delete
</button>

</div>
`;

});

});

window.delService = async function(id){
await deleteDoc(doc(db,"services",id));
}

</script>

</body>
</html>
