<!DOCTYPE html>
<html>
<head>
<title>Arman CSC Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f7fa;
}

nav {
  background:#0d6efd;
  padding:15px;
  text-align:center;
}
nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

#search {
  width:80%;
  padding:10px;
  margin:20px;
  border-radius:8px;
  border:1px solid #ccc;
}

.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

.service-box {
  background:linear-gradient(135deg,#e3f2fd,#ffffff);
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:bold;
  transition:0.3s;
}

.service-box:hover {
  transform:scale(1.08);
  background:linear-gradient(135deg,#0d6efd,#00c6ff);
  color:white;
}

footer {
  background:#222;
  color:white;
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="login.html">Login</a>
</nav>

<h1 style="text-align:center;">Arman CSC Center</h1>

<input type="text" id="search" placeholder="Search service..." onkeyup="searchService()">

<div class="services">

<a href="https://uidai.gov.in/" target="_blank">
<div class="service-box">Aadhaar</div>
</a>

<a href="https://www.onlineservices.nsdl.com/" target="_blank">
<div class="service-box">PAN Card</div>
</a>

<a href="https://voterportal.eci.gov.in/" target="_blank">
<div class="service-box">Voter ID</div>
</a>

<a href="https://www.passportindia.gov.in/" target="_blank">
<div class="service-box">Passport</div>
</a>

<a href="https://pmjay.gov.in/" target="_blank">
<div class="service-box">Ayushman</div>
</a>

<a href="https://www.onlinesbi.sbi/" target="_blank">
<div class="service-box">Bank Account</div>
</a>

</div>

<footer>
© 2026 Arman CSC Center
</footer>

<script>
function searchService() {
  let input = document.getElementById("search").value.toLowerCase();
  let boxes = document.getElementsByClassName("service-box");

  for (let i = 0; i < boxes.length; i++) {
    let text = boxes[i].innerText.toLowerCase();
    boxes[i].parentElement.style.display =
      text.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
