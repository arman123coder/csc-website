<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

header {
  background:#5a2ca0;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.container {
  padding:20px;
}

.service-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.btn {
  margin-top:10px;
  display:inline-block;
  padding:8px 15px;
  background:#5a2ca0;
  color:white;
  border-radius:6px;
  text-decoration:none;
}
</style>

</head>

<body>

<header>Our Services</header>

<div class="container">
<div class="service-grid">

<div class="card">
<h3>Sarkari Result</h3>
<a href="https://www.sarkariresult.com" target="_blank" class="btn">Open</a>
</div>

<div class="card">
<h3>PAN Card</h3>
<a href="eportal.incometax.gov.in/" class="btn">Open</a>
</div>

<div class="card">
<h3>Aadhar card</h3>
<a href="https://uidai.gov.in/" class="btn">Open</a>
</div>

<div class="card">
<h3>Railway Ticket</h3>
<a href="www.irctc.co.in" class="btn">Open</a>
</div>

<div class="card">
<h3>Account Opening SBI</h3>
<a href="onlinesbi.sbi.bank.in" class="btn">Open</a>
</div>

<div class="card">
<h3>Scholarship</h3>
<a href="scholarship.up.gov.in" class="btn">Open</a>
</div>

</div>
</div>

</body>
</html>
